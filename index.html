<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoomKeeper – Coming Soon</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #e2e8f0;
      --accent: #a78bfa;
      --accent-dark: #7c3aed;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
      overflow: hidden;
    }
    .container {
      padding: 2rem;
      max-width: 600px;
    }
    h1 {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(90deg, #c084fc, #a78bfa, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }
    .tagline {
      font-size: 1.5rem;
      opacity: 0.9;
      margin-bottom: 2.5rem;
    }
    .glow {
      position: absolute;
      top: 0;
      left: 50%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle at center, rgba(167,139,250,0.18) 0%, transparent 60%);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: -1;
    }
    .pulse {
      animation: pulse 8s infinite ease-in-out;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.4; transform: scale(0.9); }
      50%     { opacity: 0.7; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="glow pulse"></div>
  <div class="container">
    <h1>LoomKeeper</h1>
    <div class="tagline">Weaving the threads of tomorrow</div>
    <p style="font-size:1.2rem; opacity:0.7;">
      Something powerful is being crafted.<br>
      Coming soon.
    </p>
  </div>
</body>
</html>

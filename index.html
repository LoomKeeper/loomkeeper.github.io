<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
  <title>LoomKeeper – Coming Soon</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #e2e8f0;
      --accent: #a78bfa;
      --accent-dark: #7c3aed;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
      overflow: hidden;
    }
    .container {
      padding: 1.5rem;
      max-width: 90%;
      width: 100%;
    }
    h1 {
      font-size: clamp(2.8rem, 12vw, 4.2rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(90deg, #c084fc, #a78bfa, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.2rem;
      line-height: 0.95;
    }
    .tagline {
      font-size: clamp(1.1rem, 5vw, 1.4rem);
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    .glow {
      position: absolute;
      top: 0;
      left: 50%;
      width: 90vmin;
      height: 90vmin;
      max-width: 700px;
      max-height: 700px;
      background: radial-gradient(circle at center, rgba(167,139,250,0.18) 0%, transparent 60%);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: -1;
    }
    .pulse {
      animation: pulse 10s infinite ease-in-out;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.35; transform: scale(0.85) translateX(-50%); }
      50%     { opacity: 0.65; transform: scale(1.05) translateX(-50%); }
    }

    @media (max-width: 480px) {
      .container { padding: 1rem; }
      h1 { margin-bottom: 1rem; }
    }
  </style>
</head>
<body>
  <div class="glow pulse"></div>
  <div class="container">
    <h1>LoomKeeper</h1>
    <div class="tagline">Weaving the threads of tomorrow</div>
    <p style="font-size: clamp(1rem, 4.5vw, 1.15rem); opacity:0.75; line-height:1.4;">
      Something powerful is being crafted.<br>
      Coming soon.
    </p>
  </div>
</body>
</html>
